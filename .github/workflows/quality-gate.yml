name: Quality Gate

on:
  push:
      branches: [ main ]
        pull_reques
            branches[ main ]

            jobs:
              build:
                  runs-on: ubuntu-latest
                      steps:
                            - uses: actions/checkout@v4
                                  - uses: actions/setup-node@v4
                                          with:
                                                    node-version: '20'
                                                              cache: 'npm'
                                                                    - name: Install dependencies
                                                                            run: npm install
                                                                                  - name: Build Check
                                                                                          run: npm run build
                                                                                                - name: Security Check
                                                                                                        run: |
                                                                                                                  if grep -r "supabase.co/rest/v1" .; then exit 1; fi
                                                                                                                            if grep -rnE "SUPABASE_SERVICE_ROLE_KEY" .; then exit 1; fi
                                                                                                                            
