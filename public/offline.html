<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PawPal is offline</title>
    <meta
      name="description"
      content="PawPal could not reach the network. Reconnect to load live maps, store checkout, and pet safety profiles."
    />
    <style>
      :root {
        color-scheme: light;
        --ink: #171413;
        --body: #4b5863;
        --primary: #4a90d9;
        --trust: #76c7b8;
        --border: #e3ecf4;
        --panel: #ffffff;
        --subtle: #f6fafe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(74, 144, 217, 0.12), transparent 36%),
          linear-gradient(180deg, #ffffff, var(--subtle));
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 2rem;
      }

      section {
        width: min(100%, 32rem);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        box-shadow: 0 18px 48px rgba(33, 55, 78, 0.1);
      }

      .mark {
        display: inline-flex;
        height: 3rem;
        width: 3rem;
        align-items: center;
        justify-content: center;
        border-radius: 0.5rem;
        background: var(--primary);
        color: #ffffff;
        font-size: 1.45rem;
        font-weight: 900;
      }

      h1 {
        margin: 1.25rem 0 0;
        font-size: clamp(2rem, 7vw, 3.2rem);
        line-height: 1;
      }

      p {
        margin: 1rem 0 0;
        color: var(--body);
        font-size: 1rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 3rem;
        align-items: center;
        justify-content: center;
        margin-top: 1.5rem;
        border-radius: 0.5rem;
        background: var(--primary);
        color: #ffffff;
        padding: 0 1.1rem;
        font-size: 0.92rem;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <span class="mark">P</span>
        <h1>You are offline</h1>
        <p>
          PawPal needs a connection for live maps, checkout, account data, and
          public pet safety profiles. Reconnect and retry from the home page.
        </p>
        <a href="/">Back to PawPal</a>
      </section>
    </main>
  </body>
</html>
